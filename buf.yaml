version: v1
name: buf.build/viamrobotics/goutils
deps:
  - buf.build/googleapis/googleapis:e7f8d366f5264595bcc4cd4139af9973
build:
  excludes:
    - node_modules
    - rpc/examples/echo/frontend/node_modules
    - rpc/examples/echo/frontend-node/node_modules
    - rpc/examples/fileupload/frontend/node_modules
    - rpc/js/node_modules
    - vendor
breaking:
  use:
    - FILE
lint:
  use:
    - DEFAULT
  ignore_only:
    RPC_REQUEST_RESPONSE_UNIQUE:
      - proto/rpc/webrtc/v1/signaling.proto
    RPC_REQUEST_STANDARD_NAME:
      - proto/rpc/webrtc/v1/signaling.proto
    RPC_RESPONSE_STANDARD_NAME:
      - proto/rpc/webrtc/v1/signaling.proto
